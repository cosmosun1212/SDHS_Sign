<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>체험 예약 페이지</title>
  <style>
    .form-group { margin-bottom: 12px; }
    label { display: block; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <h2>체험 프로그램 예약하기</h2>
  <form id="reservationForm">
    <div class="form-group"><label>학교</label><input type="text" id="school" required></div>
    <div class="form-group"><label>학년</label><input type="text" id="grade" required></div>
    <div class="form-group"><label>반</label><input type="text" id="classNum" required></div>
    <div class="form-group"><label>이름</label><input type="text" id="name" required></div>
    <div class="form-group"><label>연락처</label><input type="tel" id="phone" placeholder="010-0000-0000" required></div>
    <div class="form-group"><label>이메일</label><input type="email" id="email" required></div>
    <div class="form-group"><label>예약시간</label><input type="datetime-local" id="reserveTime" required></div>
    <button type="submit">예약 완료</button>
  </form>

  <script>
    // 1단계에서 복사한 Apps Script 웹 앱 URL을 넣으세요.
    const GAS_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";

    document.getElementById('reservationForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = {
        school: document.getElementById('school').value,
        grade: document.getElementById('grade').value,
        classNum: document.getElementById('classNum').value,
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        reserveTime: document.getElementById('reserveTime').value
      };

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors', // CORS 문제 방지
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(() => {
        alert('예약이 정상적으로 접수되었습니다!');
        document.getElementById('reservationForm').reset();
      })
      .catch(error => {
        alert('예약 중 오류가 발생했습니다.');
        console.error(error);
      });
    });
  </script>
</body>
</html>
