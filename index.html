<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026 서울진로직업박람회 X 서울디지텍고 체험등록</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  
  <style>
    :root {
      --primary-color: #2563eb; /* 디지텍 블루 */
      --maple-color: #f97316;   /* 메이플 오렌지 */
      --bg-color: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #1e293b;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* 모바일 전용 컨테이너 */
    .mobile-wrap {
      width: 100%;
      max-width: 480px; /* PC에서 봐도 모바일 크기로 고정 */
      background-color: var(--card-bg);
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    /* 상단 헤더 영역 (AI+게임 테마) */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      padding: 35px 20px 25px;
      text-align: center;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      position: relative;
      overflow: hidden;
    }

    /* 헤더 배경 패턴 */
    .header::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 10%, transparent 10%);
      background-size: 20px 20px;
      opacity: 0.5;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1.4;
      position: relative;
      z-index: 1;
      letter-spacing: -0.5px;
    }

    /* 콜라보 로고 영역 */
    .collab-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
    }

    .collab-banner img {
      height: 36px;
      object-fit: contain;
    }

    .x-icon {
      color: #94a3b8;
      font-weight: 800;
      font-size: 1.1rem;
    }

    /* 폼 영역 */
    .form-container {
      padding: 24px;
      flex: 1;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .form-group {
      flex: 1;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      box-sizing: border-box;
      background: #f8fafc;
      transition: all 0.2s;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    input::placeholder {
      color: #94a3b8;
    }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      padding: 18px;
      margin-top: 10px;
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(30, 41, 59, 0.2);
      transition: transform 0.1s;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .highlight-text {
      color: var(--maple-color);
    }
  </style>
</head>
<body>

  <div class="mobile-wrap">
    
    <div class="header">
      <div class="badge">AI+게임 명문고 서울디지텍</div>
      <h1>2026 서울진로직업박람회<br>체험 프로그램 예약</h1>
    </div>

    <div class="collab-banner">
      <img src="https://sdh.sen.hs.kr/images/common/logo.png" alt="서울디지텍고" onerror="this.src='https://via.placeholder.com/140x40/ffffff/1e3a8a?text=Seoul+Digitech';">
      <div class="x-icon">X</div>
      <img src="https://lwi.nexon.com/msw/brand/msw_bi.png" alt="메이플스토리 월드" onerror="this.src='https://via.placeholder.com/140x40/ffffff/f97316?text=MapleStory+Worlds';">
    </div>

    <div class="form-container">
      <form id="reservationForm">
        
        <div class="form-group">
          <label>소속 학교</label>
          <input type="text" id="school" placeholder="예: 디지텍중학교" required>
        </div>

        <div class="row">
          <div class="form-group">
            <label>학년</label>
            <input type="number" id="grade" placeholder="예: 3" required>
          </div>
          <div class="form-group">
            <label>반</label>
            <input type="number" id="classNum" placeholder="예: 1" required>
          </div>
        </div>

        <div class="form-group">
          <label>학생 이름</label>
          <input type="text" id="name" placeholder="홍길동" required>
        </div>

        <div class="form-group">
          <label>휴대전화 번호</label>
          <input type="tel" id="phone" placeholder="010-0000-0000" pattern="[0-9]{2,3}-[0-9]{3,4}-[0-9]{4}" required>
        </div>

        <div class="form-group">
          <label>이메일 주소</label>
          <input type="email" id="email" placeholder="student@email.com" required>
        </div>

        <div class="form-group">
          <label>방문 희망 시간</label>
          <input type="datetime-local" id="reserveTime" required>
        </div>

        <button type="submit" class="submit-btn">
          <span class="highlight-text">메이플스토리 월드</span> 체험 예약하기
        </button>
      </form>
    </div>
  </div>

  <script>
    // 이전에 생성한 Apps Script 웹 앱 URL로 변경하세요.
    const GAS_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";

    document.getElementById('reservationForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // 제출 중 버튼 상태 변경 (중복 클릭 방지)
      const btn = document.querySelector('.submit-btn');
      const originalText = btn.innerHTML;
      btn.innerHTML = '예약 정보를 전송 중입니다...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      const formData = {
        school: document.getElementById('school').value,
        grade: document.getElementById('grade').value,
        classNum: document.getElementById('classNum').value,
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        reserveTime: document.getElementById('reserveTime').value
      };

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(() => {
        alert('🎉 예약이 정상적으로 접수되었습니다!\n입력하신 연락처로 안내 문자가 발송될 예정입니다.');
        document.getElementById('reservationForm').reset();
      })
      .catch(error => {
        alert('예약 중 오류가 발생했습니다. 다시 시도해주세요.');
        console.error(error);
      })
      .finally(() => {
        // 버튼 상태 원상복구
        btn.innerHTML = originalText;
        btn.disabled = false;
        btn.style.opacity = '1';
      });
    });
  </script>
</body>
</html>
